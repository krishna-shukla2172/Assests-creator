<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assets Creator- Home</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <!-- Toast notification container -->
  <div id="toast-container"></div>
  
  <div class="container">
    <div class="header">Assets Creator</div>
    <div class="add-target">
      <button class="btn" id="add-target-btn"><i class="fas fa-plus"></i> Add New Target</button>
    </div>
    <div id="targets-container"></div>
  </div>
  
  <!-- Bottom Navigation (Icons Only) -->
  <div class="bottom-nav">
    <a href="index.html" class="nav-item active"><i class="fas fa-home"></i></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i></a>
  </div>
  
  <!-- Add Target Modal -->
  <div id="add-target-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 style="color:white; margin-bottom:20px;">Add New Target</h2>
      
      <label style="color:#e1e4e8;">Start Date</label>
      <input type="date" id="start-date" required>
      
      <label style="color:#e1e4e8;">End Date</label>
      <input type="date" id="end-date" required>
      
      <label style="color:#e1e4e8;">Target Amount</label>
      <input type="number" id="target-amount" placeholder="Amount" required>
      
      <label style="color:#e1e4e8;">Currency</label>
      <select id="target-currency" required style="width:100%; padding:12px; background:#2d2f36; border:1px solid #3a3c44; border-radius:8px; color:#e1e4e8;">
        <option value="" disabled selected>Select currency</option>
      </select>
      
      <button class="btn" style="width:100%; margin-top:20px;" id="save-target">Let's Go</button>
    </div>
  </div>
  
  <script type="module" src="script.js"></script>
</body>

</html>
