<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assets Creator - Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <div class="container">
    <div class="header">Assets Creator</div>
    <div class="login-container">
      <div class="card" id="login-card">
        <div class="tabs">
          <button class="tab active" id="login-tab">Login</button>
          <button class="tab" id="signup-tab">Sign Up</button>
        </div>
        
        <!-- Login Form -->
        <div id="login-form" class="form active">
          <input type="email" id="login-email" placeholder="Email" required>
          <input type="password" id="login-password" placeholder="Password" required>
          <button class="btn" id="login-btn">Login</button>
          <p id="login-error" class="error"></p>
          <p style="text-align:center; margin-top:15px;">
            
          </p>
        </div>
        
        <!-- Signup Form -->
        <div id="signup-form" class="form">
          <input type="text" id="signup-firstname" placeholder="First Name" required>
          <input type="text" id="signup-lastname" placeholder="Last Name" required>
          <input type="email" id="signup-email" placeholder="Email" required>
          <input type="password" id="signup-password" placeholder="Password" required>
          <button class="btn" id="signup-btn">Sign Up</button>
          <p id="signup-error" class="error"></p>
        </div>
      </div>
    </div>
  </div>
  
  <script type="module" src="login.js"></script>
</body>

</html>
