<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assets Creator - Reset Password</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <div class="container">
    <div class="header">Reset Password</div>
    <div class="card" style="max-width: 450px; margin: 0 auto; padding: 30px;">
      <p style="margin-bottom: 20px; color: #8b8f9c;">Enter your email and a new password.</p>
      
      <div style="margin-bottom: 15px;">
        <label style="color: #e1e4e8; margin-bottom: 5px; display: block;">Email</label>
        <input type="email" id="reset-email" placeholder="your@email.com" required>
      </div>
      
      <div style="margin-bottom: 15px;">
        <label style="color: #e1e4e8; margin-bottom: 5px; display: block;">New Password</label>
        <input type="password" id="new-password" placeholder="New password" required>
      </div>
      
      <div style="margin-bottom: 25px;">
        <label style="color: #e1e4e8; margin-bottom: 5px; display: block;">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm new password" required>
      </div>
      
      <button class="btn" style="width:100%; padding: 14px; font-size: 16px;" id="reset-btn">
        <i class="fas fa-key" style="margin-right: 8px;"></i> Change Password
      </button>
      
      <p id="reset-message" style="margin-top: 20px; text-align: center;"></p>
      <p style="text-align:center; margin-top: 20px;">
        <a href="login.html" style="color:#a777e3;">Back to Login</a>
      </p>
    </div>
  </div>
  <script type="module" src="reset-password.js"></script>
</body>

</html>
